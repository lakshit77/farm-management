# Showground Live Monitoring API - Docker Compose for EC2 / local
# Usage: docker compose up -d
# API: https://api.aibolt.ai/api/v1 (via Caddy reverse proxy with automatic HTTPS)

services:
  caddy:
    image: caddy:2-alpine
    container_name: showgroundlive-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    build: .
    image: showgroundlive-api:latest
    container_name: showgroundlive-api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    # Optional: override or add env vars (e.g. for EC2)
    # environment:
    #   - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/hello/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  caddy_data:
  caddy_config:
